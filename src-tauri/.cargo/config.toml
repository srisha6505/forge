[target.x86_64-unknown-linux-gnu]
rustflags = [
    "-L", "/home/code/Production/forge/src-tauri/lib",
    "-L", "/usr/lib/x86_64-linux-gnu",
    "-L", "/tmp",
    "-C", "link-arg=-lsqlite3_stub",
    "-C", "link-arg=-Wl,--allow-multiple-definition",
]
# Note: -no-pie for the final binary is emitted from build.rs via
# `cargo:rustc-link-arg-bins=-no-pie` so it does NOT apply to proc-macro
# .so builds (which would then fail looking for a `main` symbol).

[env]
# Needed for llama-cpp-2 bindgen to find stdbool.h.
BINDGEN_EXTRA_CLANG_ARGS = "-I/usr/lib/gcc/x86_64-linux-gnu/12/include"
