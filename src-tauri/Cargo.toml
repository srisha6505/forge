[package]
name = "forge"
version = "0.2.0"
edition = "2024"
license = "AGPL-3.0"
description = "Rust-backend markdown editor with AI research agent"

[lib]
name = "forge_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
tauri-plugin-shell = "2"

serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Backend deps preserved from the GPUI version
dirs = "5"
rusqlite = { version = "0.31", features = ["bundled"] }
usearch = { version = "2", default-features = false, features = ["fp16lib"] }
ureq = { version = "2", features = ["json"] }
openssl = { version = "0.10", features = ["vendored"] }
candle-core = "0.8"
candle-nn = "0.8"
candle-transformers = "0.8"
hf-hub = "0.5"
tokenizers = "0.20"
notify = "7"
llama-cpp-2 = { version = "0.1", features = ["cuda"] }
hound = "3"
cpal = "0.15"
rand = "0.8"
byteorder = "1"
webrtc-vad = "0.4"
base64 = "0.22"

[features]
# Re-export tauri custom-protocol when building production bundle
custom-protocol = ["tauri/custom-protocol"]
