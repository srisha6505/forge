name: Release

# Two triggers:
#   * push a tag like v0.2.0  → cross-platform build + draft GitHub Release
#   * "Run workflow" button   → cross-platform build + uploadable artifacts only
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release:
        description: "Also create a draft release (only useful when run from main with a tag)"
        required: false
        default: 'false'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            label: linux-x86_64
            tauri-args: '--bundles deb'
          - os: windows-latest
            label: windows-x86_64
            tauri-args: '--bundles msi,nsis'
          - os: macos-latest
            label: macos-aarch64
            tauri-args: '--bundles dmg,app --target aarch64-apple-darwin'
          # Intel Mac (macos-13) runner pool is currently starved on
          # GitHub Actions free/standard tier, jobs sit pending for
          # hours. Apple Silicon dmg covers most users (every Mac since
          # 2020). Re-enable when needed for explicit Intel coverage.
          # - os: macos-13
          #   label: macos-x86_64
          #   tauri-args: '--bundles dmg,app --target x86_64-apple-darwin'

    runs-on: ${{ matrix.os }}
    name: build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      # ── Linux only: WebKitGTK + AppImage tooling deps ────────────────
      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            librsvg2-bin \
            patchelf \
            libssl-dev \
            pkg-config \
            libasound2-dev

      # ── Toolchains ───────────────────────────────────────────────────
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # Mac aarch64 / x86_64 cross-target needs to be added explicitly
          # so cargo finds the std lib for the target triple.
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin' || matrix.os == 'macos-13' && 'x86_64-apple-darwin' || '' }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      # ── Caches ───────────────────────────────────────────────────────
      - name: Cache cargo registry + git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ matrix.label }}-cargo-deps-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: src-tauri/target
          key: ${{ matrix.label }}-cargo-build-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/src/**/*.rs') }}
          restore-keys: |
            ${{ matrix.label }}-cargo-build-

      # ── Frontend deps ────────────────────────────────────────────────
      - name: Install JS deps
        run: bun install

      # ── Build + bundle (lite: default features, no local-llm) ────────
      # We do NOT pass --features local-llm; lite is the default and ships
      # without the bundled llama.cpp runtime so the installer is ~15 MB
      # instead of ~400 MB. Users run local LLMs via Ollama.
      - name: Build with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.tauri-args }}

      # ── Upload bundles as workflow artifacts ─────────────────────────
      # Always upload so manual runs without a tag still get downloadable
      # files. Tag-triggered runs ALSO get a draft GitHub Release via
      # tauri-action above.
      - name: Upload Linux bundles
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: forge-${{ matrix.label }}
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

      - name: Upload Windows bundles
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: forge-${{ matrix.label }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload macOS bundles
        if: startsWith(matrix.os, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: forge-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin' || 'x86_64-apple-darwin' }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin' || 'x86_64-apple-darwin' }}/release/bundle/macos/*.app
          if-no-files-found: warn
